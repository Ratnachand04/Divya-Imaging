# ============================================================
# Diagnostic Center - Docker Compose Configuration
# ============================================================
# Usage:
#   1. Run deploy.bat (Windows) or deploy.sh (Linux) for guided setup
#   OR manually:
#   2. Edit .env file with your settings
#   3. Run: docker compose up -d
#   Access: http://localhost:8081
# ============================================================

services:
  # ---- Web Server (Apache + PHP 8.2) ----
  web:
    image: ratnachand/diagnostic-center-web:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: diagnostic-center-web
    restart: always
    ports:
      - "8081:80"
      - "8443:443"
    environment:
      - DB_HOST=${DB_HOST:-db}
      - DB_USER=${DB_USER:-root}
      - DB_PASS=${DB_PASS:-root_password}
      - DB_NAME=${DB_NAME:-diagnostic_center_db}
      - APACHE_SERVER_NAME=${APACHE_SERVER_NAME:-localhost}
      - ENABLE_SSL=${ENABLE_SSL:-true}
      - PUBLIC_IP=${PUBLIC_IP:-}
      - LOCAL_IP=${LOCAL_IP:-}
      - DUAL_IP_BIND=${DUAL_IP_BIND:-false}
      - IP_CHECK_INTERVAL=${IP_CHECK_INTERVAL:-300}
      - STARTUP_NETWORK_PROBES=${STARTUP_NETWORK_PROBES:-false}
      - IP_MONITOR_APACHE_RELOAD=${IP_MONITOR_APACHE_RELOAD:-false}
      - INIT_BUNDLE_GUARD=${INIT_BUNDLE_GUARD:-true}
      - APP_PORT=${APP_PORT:-8081}
      - SSL_PORT=${SSL_PORT:-8443}
      - DB_PORT=${DB_PORT:-3301}
      - PMA_PORT=${PMA_PORT:-8082}
    volumes:
      # Mount source code directly — changes reflect after container restart (no rebuild needed)
      - .:/var/www/html
      # Mount PHP ini directly so ini changes also take effect without rebuilding the image
      - ./docker/php/custom-php.ini:/usr/local/etc/php/conf.d/custom-php.ini:ro
      # Named volumes overlay the data directories ON TOP of the bind mount above,
      # so uploaded files, bills and reports are persisted independently of the code mount.
      - uploads_data:/var/www/html/uploads
      - saved_bills_data:/var/www/html/saved_bills
      - final_reports_data:/var/www/html/final_reports
      - manager_uploads_data:/var/www/html/manager/uploads
      - dump_backup_data:/var/www/html/dump/backup
      # SSL certificates (mount your certs here)
      - ssl_certs:/etc/apache2/ssl
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost/health/ready.php > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    networks:
      - diagnostic-net

  # ---- Database Server (MariaDB 10.4) ----
  db:
    image: mariadb:10.4
    container_name: diagnostic-center-db
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASS:-root_password}
      - MYSQL_DATABASE=${DB_NAME:-diagnostic_center_db}
      - MYSQL_USER=${DB_EXTRA_USER:-diagnostic_user}
      - MYSQL_PASSWORD=${DB_EXTRA_PASS:-diagnostic_pass}
    ports:
      - "${DB_BIND_IP:-127.0.0.1}:${DB_PORT:-3301}:3306"
    volumes:
      # Persist database data
      - db_data:/var/lib/mysql
      # Auto-import SQL bundle on first run
      - ./dump/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASS:-root_password}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - diagnostic-net

  # ---- phpMyAdmin (Optional - for database management) ----
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: diagnostic-center-pma
    restart: always
    ports:
      - "${PMA_BIND_IP:-127.0.0.1}:${PMA_PORT:-8082}:80"
    environment:
      - PMA_HOST=db
      - PMA_USER=root
      - PMA_PASSWORD=${DB_PASS:-root_password}
      - UPLOAD_LIMIT=100M
    depends_on:
      db:
        condition: service_healthy
    networks:
      - diagnostic-net

# ---- Named Volumes ----
volumes:
  db_data:
    driver: local
  uploads_data:
    driver: local
  saved_bills_data:
    driver: local
  final_reports_data:
    driver: local
  manager_uploads_data:
    driver: local
  dump_backup_data:
    driver: local
  ssl_certs:
    driver: local

# ---- Network ----
networks:
  diagnostic-net:
    driver: bridge
