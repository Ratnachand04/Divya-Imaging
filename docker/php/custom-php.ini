; ============================================================
; Custom PHP Configuration for Diagnostic Center
; ============================================================

; --- Upload & POST limits ---
upload_max_filesize = 64M
post_max_size = 64M
max_file_uploads = 20

; --- Memory & Execution ---
memory_limit = 256M
max_execution_time = 300
max_input_time = 300
max_input_vars = 5000

; --- Session ---
session.gc_maxlifetime = 3600
session.cookie_httponly = 1
session.use_strict_mode = 1

; --- Error Handling ---
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /var/log/php_errors.log
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

; --- Date/Time ---
date.timezone = Asia/Kolkata

; --- OPcache (Disabled for local dev — Windows bind-mount timestamps are unreliable) ---
opcache.enable = 0
opcache.enable_cli = 0

; --- Character encoding ---
default_charset = "UTF-8"
mbstring.internal_encoding = UTF-8
