# ============================================================
# Diagnostic Center - Docker Compose (Deploy Mode)
# ============================================================
# This pulls the pre-built image from Docker Hub.
# Auto-generated by deploy.bat
# ============================================================

services:
  web:
    image: ratnachand/diagnostic-center-web:latest
    container_name: diagnostic-center-web
    restart: always
    ports:
      - "${APP_PORT:-8081}:80"
      - "${SSL_PORT:-8443}:443"
    environment:
      - DB_HOST=${DB_HOST:-db}
      - DB_USER=${DB_USER:-root}
      - DB_PASS=${DB_PASS:-root_password}
      - DB_NAME=${DB_NAME:-diagnostic_center_db}
      - APACHE_SERVER_NAME=${APACHE_SERVER_NAME:-localhost}
      - ENABLE_SSL=${ENABLE_SSL:-false}
    volumes:
      - uploads_data:/var/www/html/uploads
      - saved_bills_data:/var/www/html/saved_bills
      - final_reports_data:/var/www/html/final_reports
      - manager_uploads_data:/var/www/html/manager/uploads
      - ssl_certs:/etc/apache2/ssl
    depends_on:
      db:
        condition: service_healthy
    networks:
      - diagnostic-net

  db:
    image: mariadb:10.4
    container_name: diagnostic-center-db
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASS:-root_password}
      - MYSQL_DATABASE=${DB_NAME:-diagnostic_center_db}
      - MYSQL_USER=${DB_EXTRA_USER:-diagnostic_user}
      - MYSQL_PASSWORD=${DB_EXTRA_PASS:-diagnostic_pass}
    ports:
      - "${DB_PORT:-3301}:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./diagnostic_center_db_.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASS:-root_password}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - diagnostic-net

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: diagnostic-center-pma
    restart: always
    ports:
      - "${PMA_PORT:-8082}:80"
    environment:
      - PMA_HOST=db
      - PMA_USER=root
      - PMA_PASSWORD=${DB_PASS:-root_password}
      - UPLOAD_LIMIT=100M
    depends_on:
      db:
        condition: service_healthy
    networks:
      - diagnostic-net

volumes:
  db_data:
  uploads_data:
  saved_bills_data:
  final_reports_data:
  manager_uploads_data:
  ssl_certs:

networks:
  diagnostic-net:
    driver: bridge
